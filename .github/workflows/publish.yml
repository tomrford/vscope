name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.1

      - run: pnpm install --frozen-lockfile
      - name: Validate release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          version="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          expected_tag="v${version}"

          if [ "${RELEASE_TAG}" != "${expected_tag}" ]; then
            echo "::error::Release tag ${RELEASE_TAG} does not match package version ${version}"
            exit 1
          fi

          git fetch --force origin "refs/heads/main:refs/remotes/origin/main" "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          tag_commit="$(git rev-parse "${RELEASE_TAG}^{commit}")"

          if ! git merge-base --is-ancestor "${tag_commit}" origin/main; then
            echo "::error::Release tag ${RELEASE_TAG} is not reachable from origin/main"
            exit 1
          fi

      - run: pnpm run check
      - run: npm publish
